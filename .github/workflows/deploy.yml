name: Deploy to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:    

permissions:
  contents: read
  pages: write
  id-token: write    

jobs:
  ci-build:

    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./src/evaristocuesta.es
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      working-directory: ./src/evaristocuesta.es

    - name: Publish
      run: dotnet publish --no-restore --configuration Release --output ./bin/publish
      working-directory: ./src/evaristocuesta.es

    - name: Show publish output
      run: ls -laR ./bin/publish || true
      working-directory: ./src/evaristocuesta.es

    - name: Generate pages
      # Run the published app from the publish folder so the content root matches the published files
      run: dotnet evaristocuesta.es.dll ssg ${{ github.workspace }}/web
      working-directory: ./src/evaristocuesta.es/bin/publish

    - name: Show generated files 
      run: ls -laR ${{ github.workspace }}/web || true

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: 'web'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

    - name: Restore tests dependencies
      run: dotnet restore
      working-directory: ./tests/evaristocuesta.es.tests

    - name: Build Tests
      run: dotnet build --no-restore --configuration Release
      working-directory: ./tests/evaristocuesta.es.tests

    - name: Ensure browsers are installed
      run: pwsh bin/Release/net10.0/playwright.ps1 install --with-deps
      working-directory: ./tests/evaristocuesta.es.tests
      
    - name: Tests
      run: dotnet test --verbosity normal --configuration Release --settings production.runsettings
      working-directory: ./tests/evaristocuesta.es.tests      